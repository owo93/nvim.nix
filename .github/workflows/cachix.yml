name: "Cachix"
on:
  pull_request:
    branches:
      - main
  push:
    branches:
     - main
jobs:
  cachix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: cachix/install-nix-action@v25
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          
    - name: Setup Cachix
      uses: cachix/cachix-action@v14
      with:
        name: owo93-nvf
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        useDaemon: true

    - name: Check flake
      run: nix flake check --all-systems --no-update-lock-file
      
    - run: |
        git diff --exit-code
    - run: nix build

    - name: Push to Cachix
      run: |
        echo "Pushing store paths to cachix..."
        nix path-info --recursive .#default | cachix push owo93-nvf
